-- Fix license declaration and lower the setuptools build-system requirement
-- to match the version available in FreeBSD ports.
--- pyproject.toml.orig	2025-10-16 21:02:30 UTC
+++ pyproject.toml	2026-07-20 17:49:53 UTC
@@ -1,7 +1,7 @@
 [build-system]
 build-backend = "setuptools.build_meta"
 requires = [
-  "setuptools >=77",
+  "setuptools >=61",
   "setuptools-git-versioning >=2.0",
 ]

@@ -11,8 +11,7 @@
 description = "List processing tools and functional utilities"
 readme = "README.rst"
 requires-python = ">=3.9"
-license = "BSD-3-Clause"
-license-files = ["LICENSE.txt"]
+license = {text = "BSD-3-Clause"}
 authors = [
   { name = "PyToolz Contributors" },
 ]
