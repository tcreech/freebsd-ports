-- Fix build with the setuptools version available in FreeBSD ports.
-- Upstream requires setuptools>=82.0.1 and uses a hyphenated package name in
-- [tool.setuptools.package-data], which the older setuptools in ports rejects.
-- Lower the build-system requirement and use package-data '*' with a find
-- include pattern so the stub files are still installed.
--- pyproject.toml.orig	2026-07-20 16:57:01 UTC
+++ pyproject.toml
@@ -1,12 +1,10 @@ build-backend = "setuptools.build_meta"
 [build-system]
 build-backend = "setuptools.build_meta"
-requires = ["setuptools>=82.0.1"]
+requires = ["setuptools>=61"]
 
 [project]
 name = "types-pytz"
 version = "2026.2.0.20260518"
-license = "Apache-2.0"
-license-files = ["LICENSE"]
 description = "Typing stubs for pytz"
 readme = { text = """\
 ## Typing stubs for pytz
@@ -46,8 +44,10 @@ dependencies = []
 "Chat" = "https://gitter.im/python/typing"
 
 [tool.setuptools]
-packages = ['pytz-stubs']
 include-package-data = false
 
+[tool.setuptools.packages.find]
+include = ['pytz-stubs']
+
 [tool.setuptools.package-data]
-'pytz-stubs' = ['__init__.pyi', 'exceptions.pyi', 'lazy.pyi', 'reference.pyi', 'tzfile.pyi', 'tzinfo.pyi', 'METADATA.toml', 'py.typed']
+'*' = ['*.pyi', '*.toml', 'py.typed']
