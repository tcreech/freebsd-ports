-- Add pyproject.toml to enable PEP 517 build with the setuptools version
-- available in FreeBSD ports. Upstream only ships setup.py/setup.cfg.

--- pyproject.toml.orig	1970-01-01 00:00:00 UTC
+++ pyproject.toml
@@ -0,0 +1,3 @@
+[build-system]
+requires = ["setuptools>=61", "wheel"]
+build-backend = "setuptools.build_meta"
