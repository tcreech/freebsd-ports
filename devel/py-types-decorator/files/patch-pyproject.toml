-- Fix build with the setuptools version available in FreeBSD ports.
-- Upstream requires setuptools>=82.0.1 and uses a hyphenated package name in
-- [tool.setuptools.package-data], which the older setuptools in ports rejects.
-- Lower the build-system requirement, normalize the license declaration, and
-- use package-data '*' with a find include pattern so the stub files are still
-- installed.
--- pyproject.toml.orig	2026-07-20 18:17:17 UTC
+++ pyproject.toml
@@ -1,12 +1,11 @@ build-backend = "setuptools.build_meta"
 [build-system]
 build-backend = "setuptools.build_meta"
-requires = ["setuptools>=82.0.1"]
+requires = ["setuptools>=61"]
 
 [project]
 name = "types-decorator"
 version = "5.2.0.20260712"
-license = "Apache-2.0"
-license-files = ["LICENSE"]
+license = {text = "Apache-2.0"}
 description = "Typing stubs for decorator"
 readme = { text = """\
 ## Typing stubs for decorator
@@ -51,8 +50,10 @@ dependencies = []
 "Chat" = "https://gitter.im/python/typing"
 
 [tool.setuptools]
-packages = ['decorator-stubs']
 include-package-data = false
 
+[tool.setuptools.packages.find]
+include = ['decorator-stubs']
+
 [tool.setuptools.package-data]
-'decorator-stubs' = ['__init__.pyi', 'METADATA.toml', 'py.typed']
+'*' = ['*.pyi', '*.toml', 'py.typed']
